<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>hora - clima</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 350px;
        }
        .brand {
            font-size: 14px;
            letter-spacing: 3px;
            color: #38bdf8;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #hora {
            font-size: 64px;
            font-weight: 300;
            margin: 10px 0;
        }
        #fecha {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .clima-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        .icon-clima {
            width: 80px;
            height: 80px;
            fill: #fbbf24; /* Color sol */
            margin-bottom: 10px;
        }
        .temp {
            font-size: 32px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand">BAUTI DEVELOPER</div>
        <div id="hora">00:00</div>
        <div id="fecha">-- de --</div>
        
        <div class="clima-box">
            <div id="weather-icon">
                <svg class="icon-clima" viewBox="0 0 24 24">
                    <path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0 c-0.55,0-1,0.45-1,1S1.45,13,2,13L2,13z M20,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13L20,13z M11,2l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2c0-0.55-0.45-1-1-1S11,1.45,11,2L11,2z M11,20l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2 c0-0.55-0.45-1-1-1S11,19.45,11,20L11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06 c0.39,0.39,1.03,0.39,1.41,0s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41 l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41L18.36,16.95z M19.42,5.99c0.39-0.39,0.39-1.03,0-1.41 c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L19.42,5.99z M7.05,18.36 c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L7.05,18.36z"/>
                </svg>
            </div>
            <div class="temp">24°C</div>
            <div id="desc-clima">Soleado</div>
        </div>
    </div>

    <script>
        function actualizar() {
            const ahora = new Date();
            
            // Hora
            const h = String(ahora.getHours()).padStart(2, '0');
            const m = String(ahora.getMinutes()).padStart(2, '0');
            const s = String(ahora.getSeconds()).padStart(2, '0');
            document.getElementById('hora').innerText = `${h}:${m}:${s}`;

            // Fecha
            const opciones = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('fecha').innerText = ahora.toLocaleDateString('es-AR', opciones);

            // Simulación de clima inteligente
            const horaActual = ahora.getHours();
            const iconBox = document.getElementById('weather-icon');
            const desc = document.getElementById('desc-clima');

            if (horaActual >= 6 && horaActual < 19) {
                desc.innerText = "Día Despejado";
                iconBox.style.fill = "#fbbf24"; // Amarillo sol
            } else {
                desc.innerText = "Noche Estrellada";
                iconBox.style.fill = "#94a3b8"; // Gris luna
            }
        }

        setInterval(actualizar, 1000);
        actualizar();
    </script>
</body>
</html>
